<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter & Sortir Database Varietas Padi</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-hover: #27ae60;
            --primary-glow: rgba(46, 204, 113, 0.2);
            --bg-body: #0f172a; /* Biru gelap pekat (Slate 900) */
            --bg-card: #1e293b; /* Lapisan kartu agak terang (Slate 800) */
            --text-main: #f8fafc; /* Putih bersih */
            --text-muted: #94a3b8; /* Abu-abu lembut */
            --border: #334155; /* Garis batas tipis */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            line-height: 1.5;
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h2 { 
            background: linear-gradient(to right, #2ecc71, #a8ff78);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px; 
            text-align: center;
            letter-spacing: -0.5px;
        }
        
        .card { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 18px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            margin-bottom: 20px; 
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .filter-box { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }

        .filter-box label { 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--text-muted); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        select { 
            width: 100%;
            padding: 14px; 
            font-size: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            outline: none; 
            background-color: #0f172a;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s ease;
            -webkit-appearance: none;
            appearance: none;
            /* Icon panah kustom berwarna terang */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
        }

        select:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        button { 
            width: 100%;
            padding: 14px; 
            font-size: 15px; 
            border-radius: 12px; 
            border: none;
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }
        
        .btn-primary { 
            background-color: var(--primary); 
            color: #0f172a; 
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }
        .btn-primary:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-1px);
        }
        .btn-primary:active { transform: translateY(0); }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { 
            background-color: rgba(255, 255, 255, 0.05); 
            border-color: var(--text-muted);
        }

        button:disabled { 
            background-color: #334155 !important; 
            color: #64748b !important;
            box-shadow: none !important;
            cursor: not-allowed; 
            transform: none !important;
        }
        
        #loading { 
            text-align: center;
            font-size: 14px;
            color: #fbbf24; 
            font-weight: 600; 
            margin-bottom: 15px; 
            display: none; 
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.2);
            padding: 12px;
            border-radius: 12px;
        }

        #statusInfo { 
            font-size: 13px; 
            color: var(--text-muted); 
            margin-bottom: 16px; 
            text-align: center;
        }
        
        .table-container {
            background: var(--bg-card); 
            border-radius: 18px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-responsive { 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
            font-size: 14px;
        }

        th, td { 
            padding: 16px; 
            border-bottom: 1px solid var(--border); 
            white-space: nowrap; 
        }

        th { 
            background-color: #111827; /* Kontras lebih gelap untuk kepala tabel */
            color: var(--text-main); 
            font-weight: 700; 
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.75px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        th:hover { background-color: #1f2937; }

        th.sort-asc::after { content: " ▲"; color: var(--primary); font-size: 11px; }
        th.sort-desc::after { content: " ▼"; color: var(--primary); font-size: 11px; }

        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.01); }
        tr:hover { background-color: rgba(255, 255, 255, 0.03); }
        
        .no-data { 
            text-align: center; 
            padding: 50px 20px; 
            color: var(--text-muted); 
            font-size: 15px; 
            font-style: italic;
        }

        .swipe-hint {
            display: block;
            text-align: right;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-right: 4px;
        }

        @media (min-width: 600px) {
            .filter-group { flex-direction: row; align-items: flex-end; }
            .filter-box { flex: 1; }
            .btn-container { flex-direction: row; }
            button { width: auto; padding: 12px 24px; }
            .swipe-hint { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pencarian Varietas Padi Unggul</h2>
        
        <div class="card">
            <div class="filter-group">
                <div class="filter-box">
                    <label for="filterUmur">Kategori Umur Panen</label>
                    <select id="filterUmur" onchange="terapkanFilter()">
                        <option value="semua">-- Semua Umur --</option>
                        <option value="genjah">Genjah (&lt; 105 HST)</option>
                        <option value="sedang">Sedang (105 - 115 HST)</option>
                        <option value="dalam">Dalam (&gt; 115 HST)</option>
                    </select>
                </div>

                <div class="filter-box">
                    <label for="filterLahan">Kesesuaian Lahan</label>
                    <select id="filterLahan" onchange="terapkanFilter()">
                        <option value="semua">-- Semua Jenis Lahan --</option>
                        <option value="lebak">Lebak / Rawa</option>
                        <option value="lembah">Lembah / Dataran Rendah (≤ 500 mdpl)</option>
                        <option value="tinggi">Dataran Tinggi (&gt; 500 mdpl)</option>
                    </select>
                </div>
            </div>

            <div class="btn-container">
                <button id="btnAmbilData" class="btn-primary" onclick="muatDataMentahDariSheet()">Hubungkan ke Database</button>
                <button id="btnTampilkanSemua" class="btn-secondary" onclick="tampilkanSemuaData()">Tampilkan Semua</button>
            </div>
        </div>

        <div id="loading">Menghubungkan ke Google Sheets, harap tunggu...</div>
        <div id="statusInfo">Hubungkan ke database terlebih dahulu untuk menyaring data.</div>

        <span class="swipe-hint">Ketuk judul kolom untuk menyortir • Geser tabel &rarr;</span>
        <div class="table-container">
            <div class="table-responsive">
                <table id="tabelPadi">
                    <thead>
                        <tr id="headerTabel"></tr>
                    </thead>
                    <tbody id="bodyTabel">
                        <tr>
                            <td class="no-data">Silakan klik tombol "Hubungkan ke Database" di atas.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwrpX-XTG4qj2kty1gm4J9AmTx39EGCwR0haP1uW9xH4ZQgN0TEHCCPT2SDm2WHfrFrlg/exec"; 

        let databasePadiGlobal = []; 
        let dataTersaringGlobal = [];
        let kolomSortirAktif = null;
        let arahSortirAsc = true;

        async function muatDataMentahDariSheet() {
            const loading = document.getElementById('loading');
            const btn = document.getElementById('btnAmbilData');
            const statusInfo = document.getElementById('statusInfo');
            
            loading.style.display = "block";
            btn.disabled = true;
            statusInfo.innerText = "Mengunduh data...";

            try {
                const response = await fetch(API_URL);
                const hasil = await response.json();

                if (hasil.status === "success" && hasil.data.length > 0) {
                    databasePadiGlobal = hasil.data;
                    statusInfo.innerText = "Database berhasil terhubung. Total data: " + databasePadiGlobal.length + " varietas.";
                    bangunHeaderTabel(databasePadiGlobal[0]);
                    terapkanFilter();
                } else {
                    alert("Koneksi sukses tetapi tidak ada data yang ditemukan di sheet.");
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert("Gagal terhubung ke data. Pastikan Google Script Anda sudah di-Deploy sebagai 'Anyone'.");
                btn.disabled = false;
            } finally {
                loading.style.display = "none";
            }
        }

        function bangunHeaderTabel(objekPertama) {
            const headerTabel = document.getElementById('headerTabel');
            headerTabel.innerHTML = "";
            const kolom = Object.keys(objekPertama);
            
            kolom.forEach(namaKolom => {
                let th = document.createElement('th');
                th.innerText = namaKolom;
                th.onclick = () => urutkanTabelBerdasarkanKolom(namaKolom, th);
                headerTabel.appendChild(th);
            });
        }

        function tampilkanSemuaData() {
            document.getElementById('filterUmur').value = "semua";
            document.getElementById('filterLahan').value = "semua";
            terapkanFilter();
        }

        function terapkanFilter() {
    if (databasePadiGlobal.length === 0) return;

    const pilihanUmur = document.getElementById('filterUmur').value;
    const pilihanLahan = document.getElementById('filterLahan').value;

    dataTersaringGlobal = databasePadiGlobal.filter(padi => {
        // 1. Ambil data umur secara eksplisit dari header "umur"
        // Kita gunakan trim() untuk memastikan tidak ada spasi tersembunyi
        let valUmur = padi["umur"]; 
        let angkaUmur = parseInt(valUmur);
        if (isNaN(angkaUmur)) angkaUmur = 0;

        let cocokUmur = false;
        if (pilihanUmur === "semua") { 
            cocokUmur = true; 
        } else if (pilihanUmur === "genjah") { 
            cocokUmur = angkaUmur < 105; 
        } else if (pilihanUmur === "sedang") { 
            cocokUmur = (angkaUmur >= 105 && angkaUmur <= 115); 
        } else if (pilihanUmur === "dalam") { 
            cocokUmur = angkaUmur > 115; 
        }

        // 2. Ambil data adaptasi (lahan)
        let textLahan = padi["adaptasi"] ? padi["adaptasi"].toString().toLowerCase() : "";
        
        let cocokLahan = false;
        if (pilihanLahan === "semua") { 
            cocokLahan = true; 
        } else if (pilihanLahan === "lebak" && (textLahan.includes("rawa") || textLahan.includes("lebak"))) { 
            cocokLahan = true; 
        } else if (pilihanLahan === "lembah" && textLahan.includes("0 -")) { 
            // Mencari pola "0 - 600" atau "0 - 800" yang umum di sheet Anda
            cocokLahan = true; 
        } else if (pilihanLahan === "tinggi" && textLahan.includes("tinggi")) { 
            cocokLahan = true; 
        }

        return cocokUmur && cocokLahan;
    });

    cetakDataKeTabel(dataTersaringGlobal);
}
        function urutkanTabelBerdasarkanKolom(namaKolom, elemenTh) {
            if (dataTersaringGlobal.length === 0) return;

            if (kolomSortirAktif === namaKolom) {
                arahSortirAsc = !arahSortirAsc;
            } else {
                kolomSortirAktif = namaKolom;
                arahSortirAsc = true;
            }

            document.querySelectorAll('#headerTabel th').forEach(th => th.className = "");
            elemenTh.className = arahSortirAsc ? "sort-asc" : "sort-desc";

            dataTersaringGlobal.sort((a, b) => {
                let nilaiA = a[namaKolom] ? a[namaKolom].toString().trim() : "";
                let nilaiB = b[namaKolom] ? b[namaKolom].toString().trim() : "";

                let angkaA = parseInt(nilaiA.match(/\d+/));
                let angkaB = parseInt(nilaiB.match(/\d+/));

                if (!isNaN(angkaA) && !isNaN(angkaB)) {
                    return arahSortirAsc ? angkaA - angkaB : angkaB - angkaA;
                }

                return arahSortirAsc 
                    ? nilaiA.localeCompare(nilaiB, undefined, {numeric: true, sensitivity: 'base'})
                    : nilaiB.localeCompare(nilaiA, undefined, {numeric: true, sensitivity: 'base'});
            });

            cetakDataKeTabel(dataTersaringGlobal);
        }

        function cetakDataKeTabel(data) {
            const bodyTabel = document.getElementById('bodyTabel');
            bodyTabel.innerHTML = "";

            if (data.length === 0) {
                const jumlahKolom = databasePadiGlobal.length > 0 ? Object.keys(databasePadiGlobal[0]).length : 1;
                bodyTabel.innerHTML = `<tr><td colspan="${jumlahKolom}" class="no-data">Tidak ada varietas yang cocok dengan kombinasi filter ini.</td></tr>`;
                return;
            }

            const daftarKolom = Object.keys(databasePadiGlobal[0]);
            data.forEach(padi => {
                let tr = document.createElement('tr');
                daftarKolom.forEach(kolom => {
                    let td = document.createElement('td');
                    td.innerText = padi[kolom] || "-";
                    tr.appendChild(td);
                });
                bodyTabel.appendChild(tr);
            });
        }
    </script>
</body>
</html>
